<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>Mapbox Storytelling</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link rel="icon" type="image/x-icon"
        href="https://raw.githubusercontent.com/mapbox/assembly/publisher-staging/src/svgs/mapbox.svg">
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css' rel='stylesheet' />
    <script src="https://cdn.jsdelivr.net/npm/mapbox-gl-globe-minimap@1.2.0/dist/bundle.js"></script>
    <script src="https://unpkg.com/scrollama"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <link rel="stylesheet" href="https://use.typekit.net/kqj3chj.css" />
    <link href='style.css' rel='stylesheet' />
</head>

<body>

    <div id="map"></div>
    <div id="story">
        <video id="background-video" autoplay loop muted playsinline poster="assets/clip1b.webp" preload="auto">
        <source src="assets/clip1b_web.mp4" type="video/mp4">
    </video>
     <!-- <div class="safe-frame"></div> -->
    </div>

    <script src="./config.js"></script>
    <script>
        var initLoad = true;
        var layerTypes = {
            'fill': ['fill-opacity'],
            'line': ['line-opacity'],
            'circle': ['circle-opacity', 'circle-stroke-opacity'],
            'symbol': ['icon-opacity', 'text-opacity'],
            'raster': ['raster-opacity'],
            'fill-extrusion': ['fill-extrusion-opacity'],
            'heatmap': ['heatmap-opacity']
        }

        var alignments = {
            'left': 'lefty',
            'center': 'centered',
            'right': 'righty',
            'full': 'fully',
            'none': 'no-box'
        }

        function getLayerPaintType(layer) {
            var mapLayer = map.getLayer(layer);
            if (!mapLayer) return [];
            var layerType = mapLayer.type;
            return layerTypes[layerType];
        }

        function setLayerOpacity(layer) {
            var paintProps = getLayerPaintType(layer.layer);
            paintProps.forEach(function (prop) {
                var options = {};
                if (layer.duration) {
                    var transitionProp = prop + "-transition";
                    options = { "duration": layer.duration };
                    map.setPaintProperty(layer.layer, transitionProp, options);
                }
                map.setPaintProperty(layer.layer, prop, layer.opacity, options);
            });

            // Sync marker visibility with the route layer
            if (layer.layer === 'route-layer' && animationMarker) {
                const markerElem = animationMarker.getElement();
                markerElem.style.transition = `opacity ${layer.duration || 0}ms`;
                markerElem.style.opacity = layer.opacity;
            }
        }

        function debounce(func, delay) {
            let timer;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        var story = document.getElementById('story');
        var features = document.createElement('div');
        features.setAttribute('id', 'features');

        var header = document.createElement('div');

        if (config.title) {
            var titleText = document.createElement('h1');
            titleText.innerHTML = config.title;
            header.appendChild(titleText);
        }

        if (config.subtitle) {
            var subtitleText = document.createElement('h2');
            subtitleText.innerText = config.subtitle;
            header.appendChild(subtitleText);
        }

        if (config.byline) {
            var bylineText = document.createElement('p');
            bylineText.innerText = config.byline;
            header.appendChild(bylineText);
        }

        if (config.start) {
            var startButton = document.createElement('button');
            startButton.innerText = config.start;
            startButton.classList.add('start-button');

            startButton.addEventListener('click', function () {
                var firstChapter = document.getElementById(config.chapters[0].id);
                if (firstChapter) {
                    // Use absolute position relative to the document body for stability
                    var bodyRect = document.body.getBoundingClientRect().top;
                    var elementRect = firstChapter.getBoundingClientRect().top;
                    var elementPosition = elementRect - bodyRect;

                    var offset = window.innerHeight * 0.1; 
                    var targetPosition = elementPosition - offset;
                    window.scrollTo({ top: targetPosition, behavior: 'smooth' });
                }
            });
            header.appendChild(startButton);
        }

        // Add scroll instruction and animated arrows
        var scrollHint = document.createElement('div');
        scrollHint.classList.add('scroll-indicator');
        scrollHint.innerHTML = '<span>SCROLL TO EXPLORE</span>' +
                               '<div class="arrow"></div><div class="arrow"></div>';
        header.appendChild(scrollHint);

        if (header.innerText.length > 0) {
            header.classList.add(config.theme);
            header.setAttribute('id', 'header');
            story.appendChild(header);
        }

        config.chapters.forEach((record, idx) => {
            var container = document.createElement('div');
            var chapter = document.createElement('div');

            if (record.title) {
                var title = document.createElement('h3');
                title.innerText = record.title;
                chapter.appendChild(title);
            }

            if (record.image) {
                var image = new Image();
                image.src = record.image;
                chapter.appendChild(image);
            }
            // change var story -> var chapterDescription
            if (record.description) {
                var chapterDescription = document.createElement('p');
                chapterDescription.innerHTML = record.description;
                chapter.appendChild(chapterDescription);
            }

            container.setAttribute('id', record.id);
            container.classList.add('step');
            if (idx === 0) {
                container.classList.add('active');
            }

            chapter.classList.add(config.theme);
            container.appendChild(chapter);
            container.classList.add(alignments[record.alignment] || 'centered');
            if (record.hidden) {
                container.classList.add('hidden');
            }
            features.appendChild(container);
        });

        story.appendChild(features);

        var footer = document.createElement('div');

        if (config.footer) {
            var footerText = document.createElement('p');
            footerText.innerHTML = config.footer;
            footer.appendChild(footerText);
        }

        if (footer.innerText.length > 0) {
            footer.classList.add(config.theme);
            footer.setAttribute('id', 'footer');
            story.appendChild(footer);
        }

        mapboxgl.accessToken = config.accessToken;

        var map = new mapboxgl.Map({
            container: 'map',
            style: config.style,
            center: config.chapters[0].location.center,
            zoom: config.chapters[0].location.zoom,
            bearing: config.chapters[0].location.bearing,
            pitch: config.chapters[0].location.pitch,
            interactive: false,
            projection: config.projection
        });

        // Create a inset map if enabled in config.js
        if (config.inset) {
            map.addControl(
                new GlobeMinimap({ ...config.insetOptions }),
                config.insetPosition
            );
        }

        if (config.showMarkers) {
            var marker = new mapboxgl.Marker({ color: config.markerColor });
            marker.setLngLat(config.chapters[0].location.center).addTo(map);
        }

        // instantiate the scrollama
        var scroller = scrollama();

        // Global variables for the animation
        let routePath;
        let routeDistance;
        let animationMarker;
        let currentPathProgress = 0; // Global tracker for path reveal (0 to 1)
        let animationFrameId = null; // Track the requestAnimationFrame ID

        const pulsingDotSize = 100;
        const pulsingDot = {
            width: pulsingDotSize,
            height: pulsingDotSize,
            data: new Uint8Array(pulsingDotSize * pulsingDotSize * 4),

            onAdd: function () {
                const canvas = document.createElement('canvas');
                canvas.width = this.width;
                canvas.height = this.height;
                this.context = canvas.getContext('2d');
            },

            render: function () {
                const duration = 1000;
                const t = (performance.now() % duration) / duration;
                const radius = (pulsingDotSize / 2) * 0.3;
                const outerRadius = (pulsingDotSize / 2) * 0.7 * t + radius;
                const context = this.context;

                context.clearRect(0, 0, this.width, this.height);
                context.beginPath();
                context.arc(this.width / 2, this.height / 2, outerRadius, 0, Math.PI * 2);
                context.fillStyle = `rgba(83, 142, 224, ${1 - t})`;
                context.fill();

                context.beginPath();
                context.arc(this.width / 2, this.height / 2, radius, 0, Math.PI * 2);
                context.fillStyle = 'rgba(83, 142, 224, 1)';
                context.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                context.lineWidth = 2 + 4 * (1 - t);
                context.fill();
                context.stroke();

                this.data = context.getImageData(
                    0,
                    0,
                    this.width,
                    this.height
                ).data;

                map.triggerRepaint();
                return true;
            }
        };

        // The callback function defined for config.js
        window.startPathAnimation = function(chapter) {
            if (!routePath || !chapter || chapter.pathEnd === undefined) return;

            // 1. Cancel any existing animation loop immediately to prevent overlapping
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            const targetProgress = chapter.pathEnd;
            // Use pathStart if defined, otherwise continue from current progress
            const effectiveStartProgress = (chapter.pathStart !== undefined) ? chapter.pathStart : currentPathProgress;

            // 2. Sync the global tracker immediately to the starting position of this chapter
            currentPathProgress = effectiveStartProgress;

            // 3. Jump marker and line metrics to the start point immediately to hide previous chapter state
            const initialPoint = turf.along(routePath, routeDistance * currentPathProgress).geometry.coordinates;
            if (!animationMarker) {
                animationMarker = new mapboxgl.Marker({
                    color: 'red',
                    scale: 0.8,
                    pitchAlignment: 'auto',
                    rotationAlignment: 'auto'
                })
                .setLngLat(initialPoint)
                .addTo(map);
            } else {
                animationMarker.setLngLat(initialPoint);
            }

            map.setPaintProperty('route-layer', 'line-gradient', [
                'step',
                ['line-progress'],
                'red',
                currentPathProgress,
                'rgba(255, 0, 0, 0)'
            ]);

            // 4. If we are already at the target, no need to run the animation loop
            if (targetProgress === currentPathProgress) return;

            // Use chapter-specific duration if provided, otherwise default to 4000ms
            const segmentDuration = chapter.animationDuration || 4000; 
            let start = null;
            
            // Easing function: easeOutQuad
            const ease = t => t * (2 - t);

            function frame(time) {
                if (!start) {
                    start = time;
                    animationFrameId = window.requestAnimationFrame(frame);
                    return;
                }
                
                const elapsed = time - start;
                const phase = ease(Math.min(elapsed / segmentDuration, 1));

                // Calculate progress for this frame and update global tracker
                const frameProgress = effectiveStartProgress + (targetProgress - effectiveStartProgress) * phase;
                currentPathProgress = frameProgress;

                const alongPath = turf.along(routePath, routeDistance * frameProgress)
                    .geometry.coordinates;
                
                const lngLat = {
                    lng: alongPath[0],
                    lat: alongPath[1]
                };

                animationMarker.setLngLat(lngLat);

                map.setPaintProperty('route-layer', 'line-gradient', [
                    'step',
                    ['line-progress'],
                    'red',
                    frameProgress,
                    'rgba(255, 0, 0, 0)'
                ]);

                if (phase < 1) {
                    animationFrameId = window.requestAnimationFrame(frame);
                }
            }

            // 5. Start the engine. Animation and camera flight now run concurrently for a smoother experience.
            animationFrameId = window.requestAnimationFrame(frame);
        };

        window.addStaticImageToMap = function(chapter) {
            let overlay = document.getElementById('image-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'image-overlay';
                overlay.style.position = 'fixed';
                overlay.style.top = '-50vh';
                overlay.style.left = '7vw';
                overlay.style.width = '85vw';
                overlay.style.height = '150vh';
                overlay.style.backgroundImage = 'url("assets/arda1.avif")';
                overlay.style.backgroundSize = 'cover';
                overlay.style.backgroundPosition = 'center';
                overlay.style.opacity = '0';
                overlay.style.transition = 'opacity 3000ms';
                overlay.style.zIndex = '1'; // Above the map, behind the text steps
                overlay.style.pointerEvents = 'none';
                document.body.insertBefore(overlay, document.getElementById('story'));
            }
            // Trigger opacity fade-in
            overlay.style.opacity = '1';
        };

        window.hidePhoto = function() {
            const overlay = document.getElementById('image-overlay');
            if (overlay) overlay.style.opacity = '0';
        };

        var debouncedStepEnter = debounce(function (chapterId) {
            var current_chapter = config.chapters.findIndex(chap => chap.id === chapterId);
            var chapter = config.chapters[current_chapter];

            // Use the duration from the location config if provided
            map[chapter.mapAnimation || 'flyTo'](chapter.location);
            
            if (config.showMarkers) {
                marker.setLngLat(chapter.location.center);
            }
            if (chapter.onChapterEnter.length > 0) {
                chapter.onChapterEnter.forEach(setLayerOpacity);
            }

            // Automatically hide the full-screen photo if we aren't in ch4
            if (chapter.callback !== 'addStaticImageToMap') {
                window.hidePhoto();
            }

            if (chapter.callback) {
                window[chapter.callback](chapter); // Pass the chapter object to the callback
            }
            if (chapter.rotateAnimation) {
                map.once('moveend', () => {
                    const rotateNumber = map.getBearing();
                    map.rotateTo(rotateNumber + 180, {
                        duration: 30000,
                        easing: function (t) {
                            return t;
                        }
                    });
                });
            }
            if (config.auto) {
                var next_chapter = (current_chapter + 1) % config.chapters.length;
                map.once('moveend', () => {
                    document.querySelectorAll('[data-scrollama-index="' + next_chapter.toString() + '"]')[0].scrollIntoView();
                });
            }
        }, 100);

        var debouncedStepExit = debounce(function (chapterId) {
            var chapter = config.chapters.find(chap => chap.id === chapterId);
            if (chapter.onChapterExit.length > 0) {
                chapter.onChapterExit.forEach(setLayerOpacity);
            }
        }, 100);

        map.on("load", function () {
            if (config.use3dTerrain) {
                if (!map.getSource('mapbox-dem')) {
                    map.addSource('mapbox-dem', {
                        'type': 'raster-dem',
                        'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                        'tileSize': 512,
                        'maxzoom': 14
                    });
                }
                // add the DEM source as a terrain layer with exaggerated height
                map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 2.5 });

                // add a sky layer that will show when the map is highly pitched
                if (!map.getLayer('sky')) {
                    map.addLayer({
                        'id': 'sky',
                        'type': 'sky',
                        'paint': {
                            'sky-type': 'atmosphere',
                            'sky-atmosphere-sun': [0.0, 0.0],
                            'sky-atmosphere-sun-intensity': 15
                        }
                    });
                }
            };

            // Setup path data and layers
            fetch('./assets/route.geojson')
                .then(response => response.json())
                .then(data => {
                    routePath = data.features[0];
                    routeDistance = turf.lineDistance(routePath);

                    // Extract the starting coordinate
                    const startCoords = routePath.geometry.type === 'LineString' 
                        ? routePath.geometry.coordinates[0] 
                        : routePath.geometry.coordinates[0][0];

                    if (!map.hasImage('pulsing-dot')) {
                        map.addImage('pulsing-dot', pulsingDot, { pixelRatio: 2 });
                    }

                    map.addSource('route-start-point', {
                        'type': 'geojson',
                        'data': {
                            'type': 'Point',
                            'coordinates': startCoords
                        }
                    });

                    map.addLayer({
                        'id': 'route-start-pulsing-layer',
                        'type': 'symbol',
                        'source': 'route-start-point',
                        'slot': 'top',
                        'layout': {
                            'icon-image': 'pulsing-dot',
                            'icon-allow-overlap': true,
                            'icon-ignore-placement': true
                        },
                        'paint': {
                            'icon-opacity': 0
                        }
                    });

                    // Extract the ending coordinate
                    const endCoords = routePath.geometry.type === 'LineString' 
                        ? routePath.geometry.coordinates[routePath.geometry.coordinates.length - 1] 
                        : routePath.geometry.coordinates[routePath.geometry.coordinates.length - 1].slice(-1)[0];

                    map.addSource('route-end-point', {
                        'type': 'geojson',
                        'data': {
                            'type': 'Point',
                            'coordinates': endCoords
                        }
                    });

                    map.addLayer({
                        'id': 'route-end-pulsing-layer',
                        'type': 'symbol',
                        'source': 'route-end-point',
                        'slot': 'top',
                        'layout': {
                            'icon-image': 'pulsing-dot',
                            'icon-allow-overlap': true,
                            'icon-ignore-placement': true
                        },
                        'paint': {
                            'icon-opacity': 0
                        }
                    });

                    if (!map.getSource('route-source')) {
                        map.addSource('route-source', {
                            type: 'geojson',
                            lineMetrics: true,
                            data: data
                        });
                    }

                    if (!map.getLayer('route-layer')) {
                        map.addLayer({
                            id: 'route-layer',
                            type: 'line',
                            source: 'route-source',
                            slot: 'top', // Ensures the line renders above the satellite style layers
                            layout: {
                                'line-cap': 'round',
                                'line-join': 'round'
                            },
                            paint: {
                                'line-width': 5,
                                'line-color': 'red', // Base color for the gradient
                                'line-opacity': 0    // Controlled by onChapterEnter
                            }
                        });
                    }

                    // Initialize scroller ONLY after the data is fetched and the layer is added
                    scroller
                        .setup({
                            step: '.step',
                            offset: 0.6,
                            progress: true
                        })
                        .onStepEnter(async response => {
                            response.element.classList.add('active');
                            debouncedStepEnter(response.element.id);
                        })
                        .onStepExit(response => {
                            response.element.classList.remove('active');
                            debouncedStepExit(response.element.id);
                        });

                    if (config.auto) {
                        document.querySelectorAll('[data-scrollama-index="0"]')[0].scrollIntoView();
                    }
                });
        });    

    </script>

</body>

</html>
